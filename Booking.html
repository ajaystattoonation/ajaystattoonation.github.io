<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>Tattoo Booking</title>
    <link rel="stylesheet" href="book-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>

    <div class="booking-wrapper">
        <div class="form-container">
            <header class="fade-in">
                <h1>Book Your Ink</h1>
                <p>Tell us your idea. Let's create art.</p>
            </header>

            <form action="https://api.web3forms.com/submit" method="POST">
                
                <input type="hidden" name="access_key" value="09b33895-f4cb-47c6-b907-f167bb45b641">
                
               <input type="hidden" name="redirect" value="https://ajaystattoonation.github.io/success.html">

                
                <div class="input-group slide-up delay-1">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="e.g. John Doe" required>
                    <span class="bar"></span>
                </div>

                <div class="input-group slide-up delay-2">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="e.g. john@example.com" required>
                    <span class="bar"></span>
                </div>

                <div class="input-group slide-up delay-3">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="e.g. +1 555-0199" required>
                    <span class="bar"></span>
                </div>

                <div class="input-group slide-up delay-4">
                    <label for="message">Your Concept / Message</label>
                    <textarea id="message" name="message" rows="5" placeholder="Describe placement, size, and style..." required></textarea>
                    <span class="bar"></span>
                </div>

                <button type="submit" class="btn-submit slide-up delay-5">Submit Request</button>

            </form>
        </div>
    </div>

</body>
</html>
